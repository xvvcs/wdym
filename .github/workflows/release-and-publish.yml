name: Release wdym

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    env:
      INTERNAL_APP_NAME: PromptRefactorApp
      RELEASE_APP_NAME: wdym
      SCHEME: PromptRefactorApp
      PROJECT_PATH: PromptRefactorApp/PromptRefactorApp.xcodeproj
      CONFIGURATION: Release
      DERIVED_DATA: build/DerivedData
      ARTIFACTS_DIR: build/artifacts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build unsigned app
        run: |
          set -euo pipefail

          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package DMG and ZIP
        run: |
          set -euo pipefail

          APP_PATH="$DERIVED_DATA/Build/Products/$CONFIGURATION/$INTERNAL_APP_NAME.app"
          STAGING_DIR="build/dmg-root"
          RELEASE_APP_PATH="$STAGING_DIR/$RELEASE_APP_NAME.app"
          DMG_PATH="$ARTIFACTS_DIR/${RELEASE_APP_NAME}_installer.dmg"
          ZIP_PATH="$ARTIFACTS_DIR/${RELEASE_APP_NAME}_installer.zip"

          if [ ! -d "$APP_PATH" ]; then
            echo "App bundle not found at: $APP_PATH"
            exit 1
          fi

          mkdir -p "$ARTIFACTS_DIR"
          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR"

          cp -R "$APP_PATH" "$RELEASE_APP_PATH"

          ditto -c -k --sequesterRsrc --keepParent "$RELEASE_APP_PATH" "$ZIP_PATH"

          hdiutil create \
            -volname "$RELEASE_APP_NAME" \
            -srcfolder "$STAGING_DIR" \
            -ov \
            -format UDZO \
            "$DMG_PATH"

          shasum -a 256 "$DMG_PATH" "$ZIP_PATH" > "$ARTIFACTS_DIR/SHA256SUMS.txt"

      - name: Write release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          REPO="${GITHUB_REPOSITORY}"
          TAG="${GITHUB_REF_NAME}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          RELEASE_DATE=$(date -u +"%Y-%m-%d")

          # Changes since previous release
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -n "${PREV_TAG}" ]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --format="- %h %s")
            COMMITS_HEADER="## Commits since ${PREV_TAG}"
          else
            COMMITS=$(git log --format="- %h %s")
            COMMITS_HEADER="## Commits in this release"
          fi

          GENERATED=$(gh api "repos/${REPO}/releases/generate-notes" \
            --method POST \
            -f tag_name="${TAG}" \
            --jq '.body')

          {
            echo "${GENERATED}"
            echo ""
            echo "---"
            echo ""
            echo "## Release date"
            echo ""
            echo "${RELEASE_DATE}"
            echo ""
            echo "${COMMITS_HEADER}"
            echo ""
            echo "${COMMITS}"
            echo ""
            echo "---"
            echo ""
            echo "## Download"
            echo ""
            echo "- [${RELEASE_APP_NAME}_installer.dmg](${BASE_URL}/${RELEASE_APP_NAME}_installer.dmg) — macOS disk image"
            echo "- [${RELEASE_APP_NAME}_installer.zip](${BASE_URL}/${RELEASE_APP_NAME}_installer.zip) — ZIP archive"
          } > "$ARTIFACTS_DIR/RELEASE_NOTES.md"

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          body_path: build/artifacts/RELEASE_NOTES.md
          files: |
            build/artifacts/*.dmg
            build/artifacts/*.zip
            build/artifacts/SHA256SUMS.txt

  update-readme:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Update version in README
        env:
          TAG: ${{ github.ref_name }}
        run: |
          sed -i "s/\*\*v[0-9][0-9.]*\*\*/\*\*${TAG}\*\*/" README.md

      - name: Commit and push
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || {
            git add README.md
            git commit -m "docs: set README latest release to ${TAG}"
            git push
          }
